name: Refresh dependency lock

on:
  pull_request:
    paths:
      - .github/workflows/dependency-refresh.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Refresh allowed dependency versions
        run: pnpm update --lockfile-only
      - name: Upload refreshed lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: refreshed-lockfile
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1
      - name: Install refreshed dependency graph
        run: pnpm install --frozen-lockfile
      - name: Validate addon and fixture
        run: pnpm validate
      - name: Reject high or critical advisories
        run: pnpm audit --audit-level high
